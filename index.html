<!DOCTYPE html><html lang="de"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>Schürmann Portal</title><script src="https://cdn.tailwindcss.com"></script><link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"><style>body{font-family:Inter,sans-serif;background:#111827;color:#d1d5db}.card{background:#1f2937;border:1px solid #374151}.btn-primary{background:#f59e0b;color:#111827}.btn-primary:hover{background:#d97706}.input-dark{background:#374151;border:1px solid #4b5563;color:#fff}.shortcut-card{background:#374151;border:1px solid #4b5563}.shortcut-card:hover{background:#4b5563}</style></head>
<body class="min-h-screen">
<div id="login-view" class="flex items-center justify-center min-h-screen p-4">
<div class="w-full max-w-md">
<div class="text-center mb-8"><h1 class="text-4xl font-bold text-white">SCHÜRMANN</h1><p class="text-gray-400">Stundenportal</p></div>
<div class="card p-8 rounded-2xl">
<h2 class="text-2xl font-bold text-white mb-6 text-center">Anmelden</h2>
<input id="username" placeholder="Name" class="input-dark w-full p-3 rounded-lg mb-4">
<input id="passcode" placeholder="Passwort" type="password" class="input-dark w-full p-3 rounded-lg mb-4">
<button onclick="login()" class="btn-primary w-full p-3 rounded-lg font-bold">Anmelden</button>
<div id="msg" class="text-sm mt-4 text-center"></div>
</div>
<p class="text-xs text-gray-500 text-center mt-6">Developed by Amran Hiluf</p>
</div></div>

<div id="app" style="display:none" class="min-h-screen">
<header class="bg-gray-800 p-4 flex justify-between items-center">
<h1 class="text-xl font-bold text-white">SCHÜRMANN PORTAL</h1>
<div class="flex items-center gap-4">
<span id="user-display" class="text-sm"></span>
<button onclick="logout()" class="text-sm text-gray-400 hover:text-white">Abmelden</button>
</div></header>

<main class="p-4 md:p-8 max-w-6xl mx-auto">
<h2 class="text-2xl font-bold text-white mb-6">Dashboard</h2>
<div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
<div class="card p-6 rounded-2xl"><p class="text-sm text-gray-400">Stunden diese Woche</p><p id="week-hours" class="text-3xl font-bold text-white">42.5</p></div>
<div class="card p-6 rounded-2xl"><p class="text-sm text-gray-400">Überstunden</p><p class="text-3xl font-bold text-amber-500">+2.5</p></div>
<div class="card p-6 rounded-2xl"><p class="text-sm text-gray-400">Status</p><p class="text-3xl font-bold text-green-500">Aktiv</p></div>
</div>

<h3 class="text-lg font-bold text-white mb-4">Schnellzugriff</h3>
<div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-8">
<div onclick="alert('Stunden erfassen')" class="shortcut-card p-4 rounded-xl text-center cursor-pointer"><p class="font-bold text-white">Erfassen</p></div>
<div onclick="alert('Übersicht')" class="shortcut-card p-4 rounded-xl text-center cursor-pointer"><p class="font-bold text-white">Übersicht</p></div>
<div onclick="alert('Urlaub')" class="shortcut-card p-4 rounded-xl text-center cursor-pointer"><p class="font-bold text-white">Urlaub</p></div>
<div onclick="alert('PDF Export')" class="shortcut-card p-4 rounded-xl text-center cursor-pointer"><p class="font-bold text-white">PDF</p></div>
</div>

<h3 class="text-lg font-bold text-white mb-4">Wochenübersicht</h3>
<div class="card p-6 rounded-2xl">
<div class="flex items-end gap-2 h-40">
<div class="flex-1 bg-amber-500 rounded-t" style="height:60%"><p class="text-xs text-center mt-2">Mo</p></div>
<div class="flex-1 bg-amber-500 rounded-t" style="height:80%"><p class="text-xs text-center mt-2">Di</p></div>
<div class="flex-1 bg-amber-500 rounded-t" style="height:70%"><p class="text-xs text-center mt-2">Mi</p></div>
<div class="flex-1 bg-amber-500 rounded-t" style="height:90%"><p class="text-xs text-center mt-2">Do</p></div>
<div class="flex-1 bg-amber-500 rounded-t" style="height:50%"><p class="text-xs text-center mt-2">Fr</p></div>
</div></div>
</main>
<footer class="text-center p-6 text-xs text-gray-600">Developed by Amran Hiluf</footer>
</div>

<script>
function login(){
  var u=document.getElementById('username').value.trim();
  var p=document.getElementById('passcode').value.trim();
  var msg=document.getElementById('msg');
  if(!u||!p){msg.innerText='Name und Passwort eingeben';msg.style.color='#ef4444';return;}
  localStorage.setItem('schuermann_user',u);
  document.getElementById('login-view').style.display='none';
  document.getElementById('app').style.display='block';
  document.getElementById('user-display').innerText=u;
}
function logout(){
  localStorage.removeItem('schuermann_user');
  location.reload();
}
// Auto-login if already saved
window.onload=function(){
  var u=localStorage.getItem('schuermann_user');
  if(u){
    document.getElementById('login-view').style.display='none';
    document.getElementById('app').style.display='block';
    document.getElementById('user-display').innerText=u;
  }
}
</script></body></html>
