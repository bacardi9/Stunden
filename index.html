<!DOCTYPE html><html lang="de"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>Schürmann Portal</title><script src="https://cdn.tailwindcss.com"></script><link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"><style>body{font-family:Inter,sans-serif;background:#111827;color:#d1d5db}.card{background:#1f2937;border:1px solid #374151}.btn-primary{background:#f59e0b;color:#111827}.btn-primary:hover{background:#d97706}.input-dark{background:#374151;border:1px solid #4b5563;color:#fff}</style>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
</head>
<body class="min-h-screen">
<div id="login-view" class="flex items-center justify-center min-h-screen p-4">
<div class="w-full max-w-md">
<div class="text-center mb-8"><h1 class="text-4xl font-bold text-white">SCHÜRMANN</h1><p class="text-gray-400">Stundenportal</p></div>
<div class="card p-8 rounded-2xl">
<h2 class="text-2xl font-bold text-white mb-6 text-center">Anmelden</h2>
<input id="username" placeholder="Name" class="input-dark w-full p-3 rounded-lg mb-4">
<input id="passcode" placeholder="Passwort" type="password" class="input-dark w-full p-3 rounded-lg mb-4">
<button onclick="login()" class="btn-primary w-full p-3 rounded-lg font-bold">Anmelden</button>
<div id="msg" class="text-sm mt-4 text-center text-red-500"></div>
</div>
<p class="text-xs text-gray-500 text-center mt-6">Developed by Amran Hiluf</p>
</div></div>

<div id="app" style="display:none" class="min-h-screen">
<header class="bg-gray-800 p-4 flex justify-between items-center">
<h1 class="text-xl font-bold text-white">SCHÜRMANN PORTAL</h1>
<div class="flex items-center gap-4">
<span id="user-display" class="text-sm"></span>
<button onclick="logout()" class="text-sm text-gray-400 hover:text-white">Abmelden</button>
</div></header>
<main class="p-4 md:p-8 max-w-6xl mx-auto">
<h2 class="text-2xl font-bold text-white mb-6">Dashboard</h2>
<div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
<div class="card p-6 rounded-2xl"><p class="text-sm text-gray-400">Stunden diese Woche</p><p id="week-hours" class="text-3xl font-bold text-white">0.0</p></div>
<div class="card p-6 rounded-2xl"><p class="text-sm text-gray-400">Überstunden</p><p id="ot-hours" class="text-3xl font-bold text-amber-500">+0.0</p></div>
<div class="card p-6 rounded-2xl"><p class="text-sm text-gray-400">Status</p><p class="text-3xl font-bold text-green-500">Aktiv</p></div>
</div>
<h3 class="text-lg font-bold text-white mb-4">Schnellzugriff</h3>
<div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-8">
<div onclick="alert('Kommt bald')" class="bg-gray-700 p-4 rounded-xl text-center cursor-pointer hover:bg-gray-600"><p class="font-bold text-white">Erfassen</p></div>
<div onclick="alert('Kommt bald')" class="bg-gray-700 p-4 rounded-xl text-center cursor-pointer hover:bg-gray-600"><p class="font-bold text-white">Übersicht</p></div>
<div onclick="alert('Kommt bald')" class="bg-gray-700 p-4 rounded-xl text-center cursor-pointer hover:bg-gray-600"><p class="font-bold text-white">Urlaub</p></div>
<div onclick="alert('Kommt bald')" class="bg-gray-700 p-4 rounded-xl text-center cursor-pointer hover:bg-gray-600"><p class="font-bold text-white">PDF</p></div>
</div>
<h3 class="text-lg font-bold text-white mb-4">Wochenübersicht</h3>
<div class="card p-6 rounded-2xl"><div class="flex items-end gap-2 h-40" id="week-bars"><p class="text-gray-500 text-center w-full">Lade Daten...</p></div></div>
</main>
<footer class="text-center p-6 text-xs text-gray-600">Developed by Amran Hiluf</footer>
</div>

<script>
// Your schurmann-stunden config
const firebaseConfig = {
  apiKey: "AIzaSyAr7FU8_yQ8FP9O2wk-v0RzSljoY5rNdQY",
  authDomain: "schurmann-stunden.firebaseapp.com",
  projectId: "schurmann-stunden",
  storageBucket: "schurmann-stunden.firebasestorage.app",
  messagingSenderId: "233085534554",
  appId: "1:233085534554:web:73e0c4fcf7fb0b2bd63363",
  measurementId: "G-K399E3GJ35"
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();

function nameToEmail(name){
  return name.toLowerCase().replace(/[^a-z0-9]/g,'') + '@sch.local';
}

async function login(){
  const u = document.getElementById('username').value.trim();
  const p = document.getElementById('passcode').value.trim();
  const msg = document.getElementById('msg');
  msg.innerText = '';
  if(!u||!p){msg.innerText='Name und Passwort eingeben';return;}
  
  const email = nameToEmail(u);
  msg.innerText = 'Anmelden...';
  msg.style.color = '#d1d5db';
  
  try {
    await auth.signInWithEmailAndPassword(email,p);
  } catch(err) {
    if(err.code === 'auth/user-not-found'){
      try {
        await auth.createUserWithEmailAndPassword(email,p);
      } catch(e) {
        msg.innerText = 'Fehler: ' + e.message;
        msg.style.color = '#ef4444';
        return;
      }
    } else {
      msg.innerText = 'Fehler: ' + err.message;
      msg.style.color = '#ef4444';
      return;
    }
  }
}

function logout(){ auth.signOut(); }

auth.onAuthStateChanged(user=>{
  if(user){
    document.getElementById('login-view').style.display='none';
    document.getElementById('app').style.display='block';
    document.getElementById('user-display').innerText=user.email.split('@')[0];
    loadDashboard(user.uid);
  } else {
    document.getElementById('login-view').style.display='flex';
    document.getElementById('app').style.display='none';
  }
});

async function loadDashboard(uid){
  try {
    const userDoc = await db.collection('userProfiles').doc(uid).get();
    if(!userDoc.exists){
      document.getElementById('week-hours').innerText = '0.0';
      document.getElementById('ot-hours').innerText = '+0.0';
      document.getElementById('week-bars').innerHTML = '<p class="text-gray-500 text-center w-full">Noch keine Stunden erfasst</p>';
      return;
    }
    
    const data = userDoc.data();
    const sessions = data.workSessions || [];
    
    const now = new Date();
    const monday = new Date(now);
    monday.setDate(now.getDate() - now.getDay() + 1);
    monday.setHours(0,0,0,0);
    
    let weekTotal = 0;
    const days = [0,0,0,0,0];
    
    sessions.forEach(s=>{
      if(s.type === 'arbeit' && s.startTime && s.endTime){
        const start = new Date(s.startTime);
        const end = new Date(s.endTime);
        const hours = (end - start)/3600000 - (s.breakTime||0)/60;
        if(start >= monday){
          weekTotal += hours;
          const dayIndex = start.getDay() === 0? 6 : start.getDay() - 1;
          if(dayIndex >= 0) days[dayIndex] += hours;
        }
      }
    });
    
    document.getElementById('week-hours').innerText = weekTotal.toFixed(1);
    const ot = weekTotal - 40;
    document.getElementById('ot-hours').innerText = (ot >= 0? '+' : '') + ot.toFixed(1);
    
    const maxH = Math.max(...days, 8);
    const barHtml = ['Mo','Di','Mi','Do','Fr','Sa','So'].map((d,i)=>{
      const h = days[i] > 0? (days[i]/maxH*100) : 0;
      return `<div class="flex-1 flex flex-col items-center justify-end">
        <div class="bg-amber-500 w-full rounded-t" style="height:${h}%"></div>
        <p class="text-xs mt-1">${d}</p>
      </div>`;
    }).join('');
    document.getElementById('week-bars').innerHTML = barHtml;
    
  } catch(e){
    console.error(e);
    document.getElementById('week-bars').innerHTML = '<p class="text-red-500 text-center w-full">Fehler beim Laden</p>';
  }
}
</script></body></html>
