<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Campaign Login Portal</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #333;
        }

        .login-container {
            background: #ffffff;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.2);
            width: 100%;
            max-width: 400px;
            text-align: center;
        }

        h2 {
            margin-bottom: 10px;
            color: #1e3c72;
            font-size: 28px;
        }

        p.subtitle {
            color: #666;
            margin-bottom: 30px;
            font-size: 14px;
        }

        .input-group {
            margin-bottom: 20px;
            text-align: left;
        }

        label {
            display: block;
            margin-bottom: 6px;
            font-weight: 600;
            font-size: 14px;
            color: #444;
        }

        input[type="text"],
        input[type="password"] {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #ddd;
            border-radius: 6px;
            font-size: 16px;
            transition: border-color 0.3s;
        }

        input[type="text"]:focus,
        input[type="password"]:focus {
            border-color: #2a5298;
            outline: none;
        }

        #error-message {
            margin-bottom: 20px;
            font-weight: bold;
            font-size: 14px;
            min-height: 20px;
        }

        .btn-submit {
            width: 100%;
            background-color: #2a5298;
            color: white;
            border: none;
            padding: 14px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 6px;
            cursor: pointer;
            transition: background-color 0.3s;
        }

        .btn-submit:hover {
            background-color: #1e3c72;
        }

        .btn-submit:disabled {
            background-color: #cccccc;
            cursor: not-allowed;
        }
    </style>
</head>
<body>

    <div class="login-container">
        <h2>Identity Verification</h2>
        <p class="subtitle">Enter your details to access the campaign dashboard</p>
        
        <div class="input-group">
            <label for="invite-name">Full Name</label>
            <input type="text" id="invite-name" placeholder="e.g. John Doe" autocomplete="off">
        </div>

        <div class="input-group">
            <label for="invite-code">6-Digit Verification Code</label>
            <input type="password" id="invite-code" placeholder="••••••" maxlength="6" inputmode="numeric" autocomplete="off">
        </div>

        <div id="error-message"></div>

        <button id="submit-code-btn" class="btn-submit" onclick="verifyInvitationCode()">Verify Identity</button>
    </div>

    <script>
        // CRITICAL: Replace this string with your exact Apps Script Executable URL!
        const scriptUrl = "https://script.google.com/macros/s/AKfycbyDescqnMpqjTzN9dxBW99n8RbZQWqWM44MI3N-ya51DFJ5e4nzgExtB3lztR1OFzkA/exec";

        // Clean up temporary script links from DOM dynamically
        function clearTempScripts() {
            const temps = document.querySelectorAll('.jsonp-temp');
            temps.forEach(el => el.remove());
        }

        // 1. SEND DATA TO GOOGLE SHEETS
        function verifyInvitationCode() {
            // Trim whitespace and process string configurations gracefully
            const nameInput = document.getElementById("invite-name").value.trim().toLowerCase();
            const codeInput = document.getElementById("invite-code").value.trim();
            const errorMsg = document.getElementById("error-message");
            const submitBtn = document.getElementById("submit-code-btn");
            
            // Clean interface slate
            errorMsg.innerText = "";
            clearTempScripts();

            if (!nameInput) {
                errorMsg.style.color = "#d9534f";
                errorMsg.innerText = "Please enter your full name.";
                return;
            }

            if (codeInput.length !== 6 || isNaN(codeInput)) {
                errorMsg.style.color = "#d9534f";
                errorMsg.innerText = "Please enter a valid 6-digit number.";
                return;
            }
            
            // Status update
            errorMsg.style.color = "#f0ad4e";
            errorMsg.innerText = "Authenticating with database...";
            submitBtn.disabled = true;
            
            // JSONP Pipeline Engine construction
            const script = document.createElement('script');
            script.className = 'jsonp-temp';
            script.src = scriptUrl + "?action=verify&username=" + encodeURIComponent(nameInput) + "&code=" + codeInput + "&callback=handleAuthResponse";
            
            // Append and deploy call asynchronously
            document.body.appendChild(script);
        }

        // 2. CATCH AND RESOLVE WEB APP RESPONSE
        function handleAuthResponse(response) {
            const errorMsg = document.getElementById("error-message");
            const submitBtn = document.getElementById("submit-code-btn");
            
            // Unlock submit handling immediately upon handshake reply
            if (submitBtn) submitBtn.disabled = false;
            clearTempScripts();

            if (response && response.success === true) {
                errorMsg.style.color = "#5cb85c";
                errorMsg.innerText = "Login successful! Redirecting...";
                
                // Keep local state active for active campaign tracking
                localStorage.setItem("username", response.username);
                
                // Proceed directly to app landing page layout
                setTimeout(() => {
                    window.location.href = "dashboard.html";
                }, 1200);
                
            } else {
                // FALLBACK REJECTION TRAP - Explicitly fires requested text
                errorMsg.style.color = "#d9534f";
                errorMsg.innerText = "Login incorrect. Please check your name and code.";
            }
        }
    </script>
</body>
</html>
