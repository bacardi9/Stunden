name: Remove Used Code
on:
  workflow_dispatch:
    inputs:
      code_to_remove:
        description: 'The code to remove from codes.txt'
        required: true

jobs:
  remove-code:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Private Codes Repo
        uses: actions/checkout@v4
        with:
          repository: bacardi9/Codes
          token: ${{ secrets.CODES_REPO_TOKEN }}
          path: codes-repo

      - name: Remove code from file
        run: |
          cd codes-repo
          sed -i "/^${{ github.event.inputs.code_to_remove }}$/d" codes.txt
          
      - name: Commit and Push Changes
        run: |
          cd codes-repo
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add codes.txt
          git commit -m "Automated: Removed used code"
          git push
          
