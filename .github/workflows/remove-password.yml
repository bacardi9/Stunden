Name: Remove Password from Codes File

on:
  repository_dispatch:
    types: [remove-password]

jobs:
  remove-password:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4 # Updated to v4 for better performance

      - name: Extract Password to Remove
        id: extract
        run: |
          PASSWORD="${{ github.event.client_payload.password_to_remove }}"
          echo "password=$PASSWORD" >> $GITHUB_OUTPUT
          
      - name: Remove Password from codes.txt
        run: |
          # Remove the exact password line from codes.txt
          # Using -x ensuring it matches the entire line exactly
          grep -v -x "${{ steps.extract.outputs.password }}" codes.txt > codes.txt.tmp || true
          mv codes.txt.tmp codes.txt
          
          # Verify the password was removed
          if grep -q -x "${{ steps.extract.outputs.password }}" codes.txt; then
            echo "❌ ERROR: Password was not removed!"
            exit 1
          else
            echo "✓ Password successfully removed from codes.txt"
          fi
          
      - name: Commit and Push Changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add codes.txt
          
          # Guard: Check if there are actual differences to commit
          if git diff --staged --quiet; then
            echo "No changes detected. Password might have already been removed."
          else
            git commit -m "🔐 Removed used password - ${{ github.event.client_payload.password_to_remove }}"
            git push
          fi
          
      - name: Send Success Notification
        run: |
          echo "✓ Password ${{ steps.extract.outputs.password }} has been deleted from codes.txt"
